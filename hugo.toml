# ============================================================
# Dev Digest — 每日技术精选（中 / 日 / 英）
# ============================================================

baseURL = "https://jerryni.github.io/dev-digest/"
title   = "Dev Digest"
theme   = "PaperMod"

# ---- 多语言基础 ----------------------------------------------
defaultContentLanguage         = "zh"
defaultContentLanguageInSubdir = true
hasCJKLanguage                 = true

enableRobotsTXT  = true
enableEmoji      = true
buildDrafts      = false
buildFuture      = false
buildExpired     = false
pygmentsCodeFences = true
pygmentsUseClasses = true

# ---- Minification -------------------------------------------
[minify]
  disableXML = true
  minifyOutput = true

# ---- Pagination ---------------------------------------------
[pagination]
  pagerSize = 20

# ---- 语言站点 -----------------------------------------------
[languages]

  [languages.zh]
    languageName = "中文"
    languageCode = "zh-Hans"
    weight       = 1
    title        = "Dev Digest · 每日技术精选"
    [languages.zh.params]
      description = "每天 10 条精选技术资讯，中日英三语独立编辑。"
      homeInfoParams = { Title = "Dev Digest 👋", Content = "每日精选 10 条全球技术资讯——Hacker News · GitHub Trending · Zenn · V2EX · Simon Willison。由 Claude 自动生成，每天东京时间 7:00 更新。" }
    [[languages.zh.menu.main]]
      identifier = "archive"
      name       = "归档"
      url        = "/archives/"
      weight     = 10
    [[languages.zh.menu.main]]
      identifier = "tags"
      name       = "标签"
      url        = "/tags/"
      weight     = 20
    [[languages.zh.menu.main]]
      identifier = "search"
      name       = "🔍 搜索"
      url        = "/search/"
      weight     = 30

  [languages.ja]
    languageName = "日本語"
    languageCode = "ja"
    weight       = 2
    title        = "Dev Digest · 日次技術ダイジェスト"
    [languages.ja.params]
      description = "毎日 10 本の厳選技術ニュースを、中・日・英の三言語で独立編集。"
      homeInfoParams = { Title = "Dev Digest 👋", Content = "毎日 10 本の世界の技術ニュースを厳選——Hacker News · GitHub Trending · Zenn · V2EX · Simon Willison。Claude が自動生成、東京時間 7:00 に毎日更新。" }
    [[languages.ja.menu.main]]
      identifier = "archive"
      name       = "アーカイブ"
      url        = "/archives/"
      weight     = 10
    [[languages.ja.menu.main]]
      identifier = "tags"
      name       = "タグ"
      url        = "/tags/"
      weight     = 20
    [[languages.ja.menu.main]]
      identifier = "search"
      name       = "🔍 検索"
      url        = "/search/"
      weight     = 30

  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight       = 3
    title        = "Dev Digest · Daily Tech Curation"
    [languages.en.params]
      description = "10 hand-picked tech stories every day, independently written in Chinese, Japanese, and English."
      homeInfoParams = { Title = "Dev Digest 👋", Content = "10 hand-picked global tech stories daily — Hacker News · GitHub Trending · Zenn · V2EX · Simon Willison. Auto-generated by Claude, published every day at 07:00 Tokyo time." }
    [[languages.en.menu.main]]
      identifier = "archive"
      name       = "Archive"
      url        = "/archives/"
      weight     = 10
    [[languages.en.menu.main]]
      identifier = "tags"
      name       = "Tags"
      url        = "/tags/"
      weight     = 20
    [[languages.en.menu.main]]
      identifier = "search"
      name       = "🔍 Search"
      url        = "/search/"
      weight     = 30

# ---- PaperMod 主题参数 --------------------------------------
[params]
  env                = "production"
  author             = "Jerry Ni"
  defaultTheme       = "auto"
  disableThemeToggle = false
  ShowReadingTime      = true
  ShowShareButtons     = false
  ShowPostNavLinks     = true
  ShowBreadCrumbs      = true
  ShowCodeCopyButtons  = true
  ShowWordCount        = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc           = true
  disableSpecial1stPost = false
  disableScrollToTop   = false
  comments             = false
  hidemeta             = false
  hideSummary          = false
  showtoc              = true
  tocopen              = false
  mainSections         = ["posts"]
  displayFullLangName  = true
  ShowLanguageSwitcher = true

  [params.assets]
    disableHLJS            = false
    disableFingerprinting  = false
    favicon                = "favicon.ico"
    favicon16x16           = "favicon-16x16.png"
    favicon32x32           = "favicon-32x32.png"
    apple_touch_icon       = "apple-touch-icon.png"
    safari_pinned_tab      = "safari-pinned-tab.svg"

  [params.label]
    text = "Dev Digest"
    # Inline SVG — bulletproof against subpath / 404 issues. Uses currentColor
    # so it picks up the theme's text color in both light and dark modes.
    iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>'
    iconHeight = 24

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# ---- 输出格式 (PaperMod 搜索需要) ---------------------------
[outputs]
  home = ["HTML", "RSS", "JSON"]

# ---- 代码高亮 -----------------------------------------------
[markup]
  [markup.highlight]
    codeFences   = true
    guessSyntax  = true
    lineNos      = false
    noClasses    = false
    style        = "monokai"
  [markup.goldmark.renderer]
    unsafe = true
